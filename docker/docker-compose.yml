
services:
  # MySQL数据库（存储历史结果）
  mysql:
    image: mysql:8.0
    container_name: llm-test-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: llm_perf
      MYSQL_USER: tester
      MYSQL_PASSWORD: test123
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama服务（本地模型）
  ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    container_name: llm-test-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./ollama/entrypoint.sh:/entrypoint.sh
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/root/.ollama/models
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 可选：可视化面板
  #admin
  #admin
  grafana:
    image: grafana/grafana:latest
    container_name: llm-test-grafana
    restart: unless-stopped
    ports:
      - "3300:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - test-net
    depends_on:
      - mysql

  # 可选：Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: llm-test-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - test-net

networks:
  test-net:
    driver: bridge

volumes:
  mysql_data:
  ollama_models:
  grafana_data:
  prometheus_data: